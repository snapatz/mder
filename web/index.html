<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mder</title>
    <link rel="stylesheet" href="./vendor/highlight.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-theme="light">
    <header>
      <button id="open" type="button">File &gt; Open</button>
      <select id="theme" aria-label="Theme">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="sepia">Sepia</option>
      </select>
      <label class="toggle">
        <input id="remote-images" type="checkbox">
        <span>Remote images</span>
      </label>
      <select id="mode" aria-label="View mode" disabled>
        <option value="view">Viewer</option>
        <option value="edit">Editor</option>
        <option value="dual">Dual Pane</option>
      </select>
      <input id="find" type="search" placeholder="Find" aria-label="Find in document" disabled>
      <button id="find-prev" type="button" disabled>Prev</button>
      <button id="find-next" type="button" disabled>Next</button>
      <span id="find-count" aria-live="polite"></span>
      <button id="save" type="button" disabled>Save</button>
      <select id="recent" aria-label="Recent files">
        <option value="">Recent</option>
      </select>
      <span id="path"></span>
    </header>
    <nav id="tabs" class="tabs" aria-label="Open Markdown Documents"></nav>
    <main id="viewer" class="viewer empty">Open a Markdown Document.</main>
    <div id="dirty-modal" class="modal" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="dirty-title">
        <h2 id="dirty-title">Unsaved changes</h2>
        <p id="dirty-message"></p>
        <div class="modal-actions">
          <button id="dirty-save" type="button">Save</button>
          <button id="dirty-discard" type="button">Don't Save</button>
          <button id="dirty-cancel" type="button">Cancel</button>
        </div>
      </section>
    </div>
    <script src="./vendor/highlight.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
